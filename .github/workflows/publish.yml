name: Publish Project

permissions:
  contents: write # to upload release assets
  packages: write # to publish packages

on:
  release:
    types:
      - created

jobs:

  # Build dist application adempiere-report-engine-service
  build-app:
    name: Build ADempiere Report Engine
    runs-on: ubuntu-latest
    steps:
      - name: Check out the repo
        uses: actions/checkout@v5

      - name: Setup Java JDK 17
        uses: actions/setup-java@v5
        with:
          distribution: 'temurin'
          java-package: 'jdk'
          java-version: 17
          architecture: x64

      - name: Setup Gradle 9
        uses: gradle/actions/setup-gradle@v5
        with:
          gradle-version: 9.1.0 # current

      - name: Set Version Properties
        run: |
          echo "MAIN_VERSION=${{ github.event.release.name }}" >> src/main/java/org/spin/base/version.properties
          echo "DATE_VERSION=$(date +'%Y-%m-%d')" >> src/main/java/org/spin/base/version.properties
          echo "IMPLEMENTATION_VERSION=${{ github.event.release.tag_name }}" >> src/main/java/org/spin/base/version.properties

      - name: Create Release with Gradle
        run: gradle createRelease --warning-mode all --stacktrace
        env:
          ORG_GRADLE_PROJECT_deployUsername: ${{ secrets.DEPLOY_USER }}
          ORG_GRADLE_PROJECT_deployToken: ${{ secrets.DEPLOY_TOKEN }}
          ORG_GRADLE_PROJECT_deployRepository: ${{ secrets.DEPLOY_REPOSITORY }}
          GITHUB_DEPLOY_USER: ${{ github.actor }}
          GITHUB_DEPLOY_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_DEPLOY_REPOSITORY: ${{ secrets.DEPLOY_REPOSITORY }}

      - name: Prepare flat artifacts
        run: |
          mkdir -p flat_artifacts/
          cp build/descriptors/adempiere-report-engine-service.dsc flat_artifacts/ || echo "Warning: .dsc file not found"
          cp build/release/adempiere-report-engine-service.* flat_artifacts/ || echo "Warning: release files not found"
          cp docker-compose/envoy/envoy.yaml flat_artifacts/ || echo "Warning: envoy.yaml not found"
          cp resources/env.yaml flat_artifacts/ || echo "Warning: env.yaml not found"
          ls -la flat_artifacts/

      - name: Upload Artifacts
        uses: actions/upload-artifact@v5
        with:
          name: release-artifacts
          path: flat_artifacts/*
          retention-days: 1



  publish-binaries:
    name: Publish Release Assets
    needs: build-app
    runs-on: ubuntu-latest
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v6
        with:
          name: release-artifacts
          path: artifacts/

      - name: List Assets
        run: |
          tree artifacts

      - name: Upload to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.release.tag_name }}
          files: |
            artifacts/adempiere-report-engine-service.dsc
            artifacts/env.yaml
            artifacts/envoy.yaml
            artifacts/adempiere-report-engine-service.zip.MD5
            artifacts/adempiere-report-engine-service.zip
            artifacts/adempiere-report-engine-service.tar.MD5
            artifacts/adempiere-report-engine-service.tar
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}



  # Publish docker alpine image to GitHub Container Registry
  push-alpine-image-ghcr:
    name: Push docker alpine image to GitHub Container Registry
    needs:
      - build-app
    runs-on: ubuntu-latest
    steps:
      - name: Check out the repo
        uses: actions/checkout@v5

      - name: Download dist artifacts
        uses: actions/download-artifact@v6
        with:
          name: release-artifacts
          path: artifacts/

      - name: Unzip Asset
        run: |
          tree artifacts
          unzip artifacts/adempiere-report-engine-service.zip -d docker/

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set Docker Alpine Tags
        id: set_tags_alpine
        run: |
          # Get the release type
          IS_PRE_RELEASE=${{ github.event.release.prerelease }}

          # Get branch name from release
          BRANCH_NAME="${{ github.event.release.target_commitish }}"
          # clean branch name (clear invalid characters to Docker tags)
          CLEAN_BRANCH_NAME=$(echo "$BRANCH_NAME" | sed 's/[^a-zA-Z0-9._-]/-/g')

          # Set the base tags, always include the specific version tag
          TAGS="ghcr.io/adempiere/adempiere-report-engine-service:${{ github.event.release.tag_name }}-alpine"
          TAGS+=",ghcr.io/adempiere/adempiere-report-engine-service:$CLEAN_BRANCH_NAME-alpine"
          # If it's not a pre-release, add the "latest" tag
          if [[ "$IS_PRE_RELEASE" == "false" ]]; then
            TAGS+=",ghcr.io/adempiere/adempiere-report-engine-service:alpine"
          fi
          # Set the output variable for the next step to use
          echo "tags_to_push=$TAGS" >> $GITHUB_OUTPUT

      - name: Push alpine image to GitHub Container Registry
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/alpine.Dockerfile
          push: true
          tags: ${{ steps.set_tags_alpine.outputs.tags_to_push }}

  # Publish docker ubuntu multiplatform image to GitHub Container Registry
  push-ubuntu-image-ghcr:
    name: Push docker ubuntu multiplatform image to GitHub Container Registry
    needs:
      - build-app
    runs-on: ubuntu-latest
    steps:
      - name: Check out the repo
        uses: actions/checkout@v5

      - name: Download dist artifacts
        uses: actions/download-artifact@v6
        with:
          name: release-artifacts
          path: artifacts/

      - name: Unzip Asset
        run: |
          tree artifacts
          unzip artifacts/adempiere-report-engine-service.zip -d docker/

      - name: Setup QEMU
        uses: docker/setup-qemu-action@v3

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set Docker Tags
        id: set_tags
        run: |
          # Get the release type
          IS_PRE_RELEASE=${{ github.event.release.prerelease }}

          # Get branch name from release
          BRANCH_NAME="${{ github.event.release.target_commitish }}"
          # clean branch name (clear invalid characters to Docker tags)
          CLEAN_BRANCH_NAME=$(echo "$BRANCH_NAME" | sed 's/[^a-zA-Z0-9._-]/-/g')

          # Set the base tags, always include the specific version tag
          TAGS="ghcr.io/adempiere/adempiere-report-engine-service:${{ github.event.release.tag_name }}"
          TAGS+=",ghcr.io/adempiere/adempiere-report-engine-service:$CLEAN_BRANCH_NAME"
          # If it's not a pre-release, add the "latest" tag
          if [[ "$IS_PRE_RELEASE" == "false" ]]; then
            TAGS+=",ghcr.io/adempiere/adempiere-report-engine-service:latest"
          fi
          # Set the output variable for the next step to use
          echo "tags_to_push=$TAGS" >> $GITHUB_OUTPUT

      - name: Push ubuntu image to GitHub Container Registry
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/ubuntu.Dockerfile
          platforms: linux/amd64,linux/amd64/v2,linux/arm64/v8
          push: true
          tags: ${{ steps.set_tags.outputs.tags_to_push }}



  # Publish docker grpc-proxy image to GitHub Container Registry
  push-grpc-proxy-image-ghcr:
    name: Push grpc-proxy docker image to GitHub Container Registry
    needs:
      - build-app
    runs-on: ubuntu-latest
    steps:
      - name: Check out the repo
        uses: actions/checkout@v5

      - name: Download dist artifacts
        uses: actions/download-artifact@v6
        with:
          name: release-artifacts
          path: artifacts/

      - name: Move descriptor
        run: |
          tree artifacts
          cp artifacts/adempiere-report-engine-service.dsc docker/ || echo "Warning: descriptor file not found"

      - name: Setup QEMU
        uses: docker/setup-qemu-action@v3

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set Docker Tags
        id: set_proxy_tags
        run: |
          # Get the release type
          IS_PRE_RELEASE=${{ github.event.release.prerelease }}

          # Get branch name from release
          BRANCH_NAME="${{ github.event.release.target_commitish }}"
          # clean branch name (clear invalid characters to Docker tags)
          CLEAN_BRANCH_NAME=$(echo "$BRANCH_NAME" | sed 's/[^a-zA-Z0-9._-]/-/g')

          # Set the base tags, always include the specific version tag
          TAGS="ghcr.io/adempiere/adempiere-grpc-proxy:${{ github.event.release.tag_name }}"
          TAGS+=",ghcr.io/adempiere/adempiere-grpc-proxy:$CLEAN_BRANCH_NAME"
          # If it's not a pre-release, add the "latest" tag
          if [[ "$IS_PRE_RELEASE" == "false" ]]; then
            TAGS+=",ghcr.io/adempiere/adempiere-grpc-proxy:latest"
          fi
          # Set the output variable for the next step to use
          echo "tags_to_push=$TAGS" >> $GITHUB_OUTPUT

      - name: Push image to GitHub Container Registry
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/proxy.Dockerfile
          platforms: linux/amd64,linux/amd64/v2,linux/arm64/v8
          push: true
          tags: ${{ steps.set_proxy_tags.outputs.tags_to_push }}
